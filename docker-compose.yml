services:
  db:
    image: postgres:16-alpine
    container_name: derivative-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: derivative
      POSTGRES_PASSWORD: derivative_secure_password_2024
      POSTGRES_DB: derivative
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U derivative -d derivative"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - derivative-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: derivative-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8081:8081"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - derivative-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: derivative-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@derivative.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin_secure_password_2024
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - derivative-network
    depends_on:
      - db

volumes:
  postgres_data:
  uploads_data:
  pgadmin_data:

networks:
  derivative-network:
    driver: bridge
