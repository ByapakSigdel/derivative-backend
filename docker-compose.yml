services:
  db:
    image: postgres:16-alpine
    container_name: derivative-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: derivative
      POSTGRES_PASSWORD: derivative_secure_password_2024
      POSTGRES_DB: derivative
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U derivative -d derivative"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - derivative-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: derivative-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override CORS to include server IP for Swagger UI access
      - CORS_ORIGIN=https://codeatderivative.com,https://www.codeatderivative.com,http://143.198.196.226:8081,http://143.198.196.226:8082,http://localhost:8081,http://localhost:8082
    ports:
      - "8081:8081"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - derivative-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: derivative-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@derivative.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin_secure_password_2024
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - derivative-network
    depends_on:
      - db

  caddy:
    image: caddy:2-alpine
    container_name: derivative-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - derivative-network
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  pgadmin_data:
  caddy_data:
  caddy_config:

networks:
  derivative-network:
    driver: bridge
